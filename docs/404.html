<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page not found &mdash; Agentlink</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#f97316">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="canonical" href="https://agentlink.run/">
  <style>
    :root {
      --accent:   #f97316;
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --text:     #e7e9ef;
      --muted:    #8b90a0;
      --border:   rgba(255,255,255,.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }

    .logo-wrap { margin-bottom: 2rem; opacity: .75; color: var(--accent); }

    .code {
      font-size: clamp(4rem, 20vw, 8rem);
      font-weight: 800;
      line-height: 1;
      color: var(--accent);
      letter-spacing: -.04em;
      margin-bottom: .5rem;
    }
    h1 {
      font-size: clamp(1.25rem, 4vw, 1.75rem);
      font-weight: 600;
      margin-bottom: .75rem;
    }
    p {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
      max-width: 40ch;
      margin: 0 auto 2rem;
    }

    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      background: var(--accent);
      color: #0b0d13;
      font-weight: 600;
      font-size: .9375rem;
      text-decoration: none;
      padding: .65rem 1.4rem;
      border-radius: .5rem;
      transition: filter .15s;
    }
    .home-btn:hover { filter: brightness(1.12); }
    .home-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    footer {
      position: fixed;
      bottom: 1.25rem;
      font-size: .8125rem;
      color: var(--muted);
    }
    footer a {
      color: var(--muted);
      text-decoration: underline;
      text-underline-offset: .2em;
    }
    footer a:hover { color: var(--text); }
  </style>
</head>
<body>

  <div class="logo-wrap" aria-hidden="true">
    <svg width="48" height="48" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="16" y1="16" x2="6" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="16" y1="16" x2="26" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="16" y1="16" x2="6" y2="26" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="16" y1="16" x2="26" y2="26" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <rect x="2" y="2" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="2"/>
      <rect x="22" y="2" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="2"/>
      <rect x="2" y="22" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="2"/>
      <rect x="22" y="22" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="2"/>
      <rect x="11" y="11" width="10" height="10" rx="2" fill="currentColor"/>
    </svg>
  </div>

  <div class="code" aria-hidden="true">404</div>

  <h1>Broken link</h1>
  <p>This URL doesn&rsquo;t exist on Agentlink. Fitting &mdash; Agentlink is a tool for fixing broken links.</p>

  <a href="https://agentlink.run/" class="home-btn">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
      <path d="M6.5 3L2 8l4.5 5M2 8h12" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Return home
  </a>

  <footer>
    <a href="https://agentlink.run/">agentlink.run</a>
  </footer>

</body>
</html>
