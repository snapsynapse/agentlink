name: Checks

on: [push, pull_request]

jobs:
  build:

    runs-on: ubuntu-24.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.23

    - name: Install dependencies
      run: go mod tidy

    - name: Run tests
      run: go test ./... -v

    - name: Check formatting
      run: |
        files="$(gofmt -l .)"
        if [ -n "$files" ]; then
          echo "$files"
          exit 1
        fi

    - name: Run vet
      run: go vet ./...

    - name: Run static analysis
      run: go install honnef.co/go/tools/cmd/staticcheck@2025.1.1 && staticcheck ./...

    - name: Check spelling
      run: go install github.com/client9/misspell/cmd/misspell@v0.3.4 && misspell -error .

    - name: Build
      run: go build ./...

    - name: Build binary for integration tests
      run: go build -o agentlink ./cmd/agentlink

    - name: Run integration tests
      run: go test -tags=integration -v .
