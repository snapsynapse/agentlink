name: Checks

on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.23

    - name: Check module files
      if: matrix.os == 'ubuntu-24.04'
      run: go mod tidy -diff

    - name: Run tests
      run: go test ./... -v

    - name: Run race detector
      run: go test -race ./...

    - name: Check formatting
      if: matrix.os == 'ubuntu-24.04'
      run: |
        files="$(gofmt -l .)"
        if [ -n "$files" ]; then
          echo "$files"
          exit 1
        fi

    - name: Run vet
      run: go vet ./...

    - name: Run static analysis
      if: matrix.os == 'ubuntu-24.04'
      run: go install honnef.co/go/tools/cmd/staticcheck@2025.1.1 && staticcheck ./...

    - name: Check spelling
      if: matrix.os == 'ubuntu-24.04'
      run: go install github.com/client9/misspell/cmd/misspell@v0.3.4 && misspell -error .

    - name: Check release script syntax
      if: matrix.os == 'ubuntu-24.04'
      run: sh -n scripts/release.sh scripts/verify-release.sh

    - name: Check reachable vulnerabilities
      if: matrix.os == 'ubuntu-24.04'
      run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4 && govulncheck ./...

    - name: Check workflow semantics
      if: matrix.os == 'ubuntu-24.04'
      run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7 && actionlint

    - name: Build
      run: go build ./...

    - name: Run integration tests
      run: go test -tags=integration -v .
